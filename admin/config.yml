backend:
  name: git-gateway
  repo: adityakumarpandey1/timepass
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/3a753d9d-21a9-4502-9838-2808fe2171d6/pkce
  auth_token_endpoint: /sites/3a753d9d-21a9-4502-9838-2808fe2171d6/token
  gateway_url: https://gateway.decapbridge.com

  commit_messages:
    create: Create {{collection}} "{{slug}}" via DecapBridge
    update: Update {{collection}} "{{slug}}" via DecapBridge
    delete: Delete {{collection}} "{{slug}}" via DecapBridge
    uploadMedia: Upload "{{path}}" via DecapBridge
    deleteMedia: Delete "{{path}}" via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg

site_url: https://caketownbakery.in

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "menu"
    label: "🍰 Menu"
    files:
      - file: "data/menu.json"
        label: "Menu Items"
        name: "menu"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} — {{fields.price}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }
              - label: "Category"
                name: "cat"
                widget: "select"
                options:
                  - { label: "Cakes", value: "cakes" }
                  - { label: "Pastries", value: "pastries" }
                  - { label: "Pizza", value: "pizza" }
                  - { label: "Sandwiches", value: "sandwiches" }
                  - { label: "Bakery Snacks", value: "snacks" }
                  - { label: "Cupcakes", value: "cupcakes" }
                  - { label: "Beverages", value: "beverages" }
                  - { label: "Bakes & Sweets", value: "sweets" }
                  - { label: "Party Pack", value: "party" }
                  - { label: "Photo Cakes", value: "photocakes" }
                  - { label: "Designer Cakes", value: "designercakes" }
                  - { label: "Kids Theme Cakes", value: "kidscakes" }
                  - { label: "Piñata Cakes", value: "pinatacakes" }
                  - { label: "Fresh Fruit Cakes", value: "fruitcakes" }
                  - { label: "Anniversary & Wedding Cakes", value: "annivcakes" }
              - { label: "Photo URL", name: "img", widget: "string" }
              - { label: "Badge", name: "badge", widget: "string", required: false }
              - { label: "Available Today?", name: "available", widget: "boolean", default: true }
              - { label: "Star Rating", name: "rating", widget: "number", required: false, value_type: "float", min: 1, max: 5 }
              - { label: "Number of Reviews", name: "reviews", widget: "number", required: false, value_type: "int" }

  - name: "announcement"
    label: "📢 Today's Banner"
    files:
      - file: "data/announcement.json"
        label: "Announcement"
        name: "announcement"
        fields:
          - { label: "Show this banner on the site?", name: "show", widget: "boolean", default: false }
          - { label: "Message", name: "message", widget: "string", required: false }
